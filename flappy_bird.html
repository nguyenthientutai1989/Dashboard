<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Bird PRO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  min-height:100vh;
  font-family:'Segoe UI',sans-serif;
  overflow:hidden;
}
canvas{
  border-radius:16px;
  box-shadow:0 24px 80px rgba(0,0,0,.7),0 0 0 2px rgba(255,255,255,.06);
  width:min(92vw,360px);
  height:auto;
  display:block;
}
#ui{
  margin-top:12px;
  display:flex;gap:32px;
  color:#fff;
  text-align:center;
}
.stat-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:2px;}
.stat-val{font-size:22px;font-weight:700;color:#fff;}
#ui-best .stat-val{color:#f5c518;}

:root{--nav-h:50px;}
.mwg-nav{
  position:fixed;top:0;left:0;right:0;height:var(--nav-h);
  background:rgba(10,14,24,0.95);border-bottom:1px solid rgba(255,255,255,.1);
  backdrop-filter:blur(14px);z-index:9999;
  display:flex;align-items:center;padding:0 16px;gap:8px;
  font-family:sans-serif;
}
.nav-brand{display:flex;align-items:center;gap:8px;text-decoration:none;margin-right:auto;}
.nav-badge{background:#f5c518;color:#111;font-size:9px;font-weight:800;letter-spacing:.1em;padding:3px 8px;border-radius:5px;}
.nav-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.8);}
.nav-chip{font-size:10px;color:rgba(255,255,255,.4);background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);padding:3px 10px;border-radius:20px;}
.nav-user{display:flex;align-items:center;gap:6px;font-size:11px;color:rgba(255,255,255,.5);margin-right:8px;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px rgba(74,222,128,.5);}
.nav-user strong{color:#f5c518;}
.nav-btn{display:flex;align-items:center;gap:4px;padding:6px 12px;border-radius:7px;font-size:11px;font-weight:600;font-family:sans-serif;cursor:pointer;border:1px solid transparent;text-decoration:none;transition:all 140ms;white-space:nowrap;}
.btn-home{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.12);color:rgba(255,255,255,.8);}
.btn-home:hover{background:rgba(255,255,255,.13);color:#fff;}
.btn-logout{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.25);color:#fca5a5;}
.btn-logout:hover{background:rgba(239,68,68,.2);}
@media(max-width:480px){.nav-name,.nav-chip,.nav-user{display:none;}.nav-btn{padding:5px 9px;}}
</style>
</head>
<body>

<!-- AUTH GUARD -->
<script>
(function(){
  var s=localStorage.getItem('mwg_session');
  if(!s){window.location.replace('./index.html');}
})();
</script>

<!-- NAVBAR -->
<nav class="mwg-nav">
  <a class="nav-brand" href="./main.html">
    <span class="nav-badge">MWG</span>
    <span class="nav-name">Business Intelligence</span>
  </a>
  <span class="nav-chip">🐦 Flappy Bird</span>
  <div class="nav-user">
    <span class="nav-dot"></span>
    Xin chào, <strong id="nav-user-nm">—</strong>
  </div>
  <a class="nav-btn btn-home" href="./main.html">⌂ Trang chủ</a>
  <button class="nav-btn btn-logout" onclick="mwgLogout()">↩ Đăng xuất</button>
</nav>

<canvas id="game" width="360" height="560"></canvas>
<div id="ui">
  <div id="ui-score"><div class="stat-label">Score</div><div class="stat-val" id="s">0</div></div>
  <div id="ui-best"><div class="stat-label">Best</div><div class="stat-val" id="b">0</div></div>
</div>

<script>
const c=document.getElementById("game");
const ctx=c.getContext("2d");
const W=c.width,H=c.height;

let state="idle";
let score=0;
let best=+localStorage.getItem("fb_best")||0;
document.getElementById("b").innerText=best;

// ── PHYSICS ──
const GRAVITY=0.42, FLAP=-8.2, PIPE_GAP=138, PIPE_SPEED=2.6, PIPE_W=52;

// ── BIRD ──
let bird={x:80,y:H/2,vy:0,angle:0,flapFrame:0};

// ── PIPES ──
let pipes=[];
let pipeTimer=0;

// ── PARTICLES ──
let particles=[];

// ── CLOUDS ──
let clouds=[
  {x:60,y:70,s:1},
  {x:200,y:45,s:.8},
  {x:310,y:95,s:.7},
];

// ── SCREEN SHAKE ──
let shake=0;

// ── STARS ──
const STARS=Array.from({length:40},()=>({
  x:Math.random()*W, y:Math.random()*(H*.4),
  r:.5+Math.random()*1.5, a:Math.random()
}));

// ── INPUT ──
document.addEventListener("keydown",e=>{if(e.code==="Space"||e.code==="ArrowUp"){e.preventDefault();action();}});
c.addEventListener("click",action);
c.addEventListener("touchstart",e=>{e.preventDefault();action();},{passive:false});

function action(){
  if(state==="idle"){state="play"; flap(); return;}
  if(state==="play"){flap(); return;}
  if(state==="dead"){reset();}
}

function flap(){
  bird.vy=FLAP;
  bird.flapFrame=10;
  spawnParticles(bird.x+16,bird.y+10,5,"#fde68a");
}

function reset(){
  state="idle";
  score=0;
  pipes=[];
  pipeTimer=0;
  particles=[];
  bird.y=H/2; bird.vy=0; bird.angle=0; bird.flapFrame=0;
  document.getElementById("s").innerText=0;
}

function spawnParticles(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=1+Math.random()*3;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1.5,life:1,col,r:2+Math.random()*3});
  }
}

// ── UPDATE ──
function update(){
  // clouds scroll
  clouds.forEach(cl=>{
    cl.x-=0.4*cl.s;
    if(cl.x<-80) cl.x=W+80;
  });

  if(state==="play"){
    pipeTimer++;

    // bird
    bird.vy+=GRAVITY;
    bird.y+=bird.vy;
    bird.angle=Math.min(Math.PI/2,bird.vy*0.055);
    bird.flapFrame=Math.max(0,bird.flapFrame-1);

    // spawn pipes
    if(pipeTimer%72===0){
      const top=75+Math.random()*210;
      pipes.push({x:W+10,top,passed:false});
    }

    // pipes
    pipes.forEach(p=>{
      p.x-=PIPE_SPEED;
      if(!p.passed&&p.x+PIPE_W<bird.x){
        p.passed=true; score++;
        document.getElementById("s").innerText=score;
        spawnParticles(bird.x+16,bird.y,8,"#4ade80");
      }
      if(collide(p)) die();
    });
    pipes=pipes.filter(p=>p.x>-PIPE_W-20);

    if(bird.y>H-65||bird.y<0) die();
  }

  // particles
  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.life-=0.05;
  });
  particles=particles.filter(p=>p.life>0);

  if(shake>0) shake*=0.85;
}

function collide(p){
  const bx=bird.x+5,by=bird.y+5,bw=22,bh=14;
  if(bx<p.x+PIPE_W&&bx+bw>p.x){
    if(by<p.top||by+bh>p.top+PIPE_GAP) return true;
  }
}

function die(){
  if(state==="dead") return;
  state="dead"; shake=14;
  spawnParticles(bird.x+16,bird.y+10,25,"#fbbf24");
  spawnParticles(bird.x+16,bird.y+10,12,"#fff");
  if(score>best){
    best=score;
    localStorage.setItem("fb_best",best);
    document.getElementById("b").innerText=best;
  }
}

// ── DRAW HELPERS ──
function rr(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,"#0ea5e9");
  g.addColorStop(0.65,"#7dd3fc");
  g.addColorStop(1,"#bae6fd");
  ctx.fillStyle=g;
  ctx.fillRect(0,0,W,H);

  // stars (only show at top area, faded)
  if(state==="idle"){
    STARS.forEach(st=>{
      ctx.globalAlpha=st.a*0.4*(1-st.y/(H*0.4));
      ctx.fillStyle="#fff";
      ctx.beginPath(); ctx.arc(st.x,st.y,st.r,0,Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha=1;
  }
}

function drawClouds(){
  clouds.forEach(cl=>{
    ctx.save();
    ctx.globalAlpha=0.55;
    ctx.fillStyle="#fff";
    ctx.beginPath();
    ctx.arc(cl.x,cl.y,22*cl.s,0,Math.PI*2);
    ctx.arc(cl.x+28*cl.s,cl.y-10*cl.s,16*cl.s,0,Math.PI*2);
    ctx.arc(cl.x+50*cl.s,cl.y,18*cl.s,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function drawGround(offset){
  // dirt
  ctx.fillStyle="#78350f";
  ctx.fillRect(0,H-65,W,65);
  // grass layer
  const grassGrad=ctx.createLinearGradient(0,H-65,0,H-50);
  grassGrad.addColorStop(0,"#4ade80");
  grassGrad.addColorStop(1,"#16a34a");
  ctx.fillStyle=grassGrad;
  ctx.fillRect(0,H-65,W,16);
  // scrolling grass tufts
  ctx.fillStyle="#22c55e";
  for(let i=0;i<10;i++){
    const gx=((offset+i*38)%W+W)%W;
    rr(gx-4,H-65,12,10,3); ctx.fill();
  }
  // pebbles
  ctx.fillStyle="rgba(255,255,255,.12)";
  for(let i=0;i<8;i++){
    const px=((offset*0.5+i*46)%W+W)%W;
    ctx.beginPath(); ctx.ellipse(px,H-50,5,3,0,0,Math.PI*2); ctx.fill();
  }
}

function drawPipe(p){
  const x=p.x, tw=PIPE_W;
  const botY=p.top+PIPE_GAP;
  const botH=H-65-botY;

  // shadow
  ctx.fillStyle="rgba(0,0,0,0.15)";
  ctx.fillRect(x+5,0,tw,p.top);
  ctx.fillRect(x+5,botY,tw,botH);

  // body gradient
  const pg=ctx.createLinearGradient(x,0,x+tw,0);
  pg.addColorStop(0,"#16a34a");
  pg.addColorStop(0.3,"#22c55e");
  pg.addColorStop(0.6,"#4ade80");
  pg.addColorStop(1,"#16a34a");
  ctx.fillStyle=pg;
  ctx.fillRect(x,0,tw,p.top);
  ctx.fillRect(x,botY,tw,botH);

  // inner highlight stripe
  ctx.fillStyle="rgba(255,255,255,.18)";
  ctx.fillRect(x+10,0,8,p.top);
  ctx.fillRect(x+10,botY,8,botH);

  // caps
  const capW=tw+14, capH=22, cx=x-7;
  const cg=ctx.createLinearGradient(cx,0,cx+capW,0);
  cg.addColorStop(0,"#15803d");
  cg.addColorStop(0.35,"#22c55e");
  cg.addColorStop(0.65,"#4ade80");
  cg.addColorStop(1,"#15803d");
  ctx.fillStyle=cg;
  ctx.beginPath(); rr(cx,p.top-capH,capW,capH,5); ctx.fill();
  ctx.beginPath(); rr(cx,botY,capW,capH,5); ctx.fill();

  // cap highlight
  ctx.fillStyle="rgba(255,255,255,.2)";
  ctx.fillRect(cx+10,p.top-capH,10,capH);
  ctx.fillRect(cx+10,botY,10,capH);

  // rim line
  ctx.strokeStyle="rgba(0,0,0,.18)";
  ctx.lineWidth=1.5;
  ctx.beginPath(); rr(cx,p.top-capH,capW,capH,5); ctx.stroke();
  ctx.beginPath(); rr(cx,botY,capW,capH,5); ctx.stroke();
}

function drawBird(){
  ctx.save();
  ctx.translate(bird.x+16,bird.y+12);
  ctx.rotate(bird.angle);

  const t=Date.now()*0.018;
  const wingY=bird.flapFrame>0
    ? Math.sin(bird.flapFrame*0.8)*10
    : Math.sin(t)*5;

  // drop shadow
  ctx.save();
  ctx.globalAlpha=0.18;
  ctx.fillStyle="#000";
  ctx.beginPath();
  ctx.ellipse(3,18,14,5,0,0,Math.PI*2);
  ctx.fill();
  ctx.restore();

  // wing (behind body)
  const wingGrad=ctx.createRadialGradient(-2,wingY,1,-2,wingY,14);
  wingGrad.addColorStop(0,"#fde68a");
  wingGrad.addColorStop(1,"#d97706");
  ctx.fillStyle=wingGrad;
  ctx.beginPath();
  ctx.ellipse(-5,wingY,14,8,-0.4,0,Math.PI*2);
  ctx.fill();

  // body gradient
  const bodyGrad=ctx.createRadialGradient(-4,-5,3,0,0,20);
  bodyGrad.addColorStop(0,"#fef08a");
  bodyGrad.addColorStop(0.5,"#facc15");
  bodyGrad.addColorStop(1,"#ca8a04");
  ctx.fillStyle=bodyGrad;
  ctx.beginPath();
  ctx.ellipse(0,0,18,14,0,0,Math.PI*2);
  ctx.fill();

  // belly lighter patch
  ctx.fillStyle="rgba(255,255,255,.18)";
  ctx.beginPath();
  ctx.ellipse(2,4,10,8,0.2,0,Math.PI*2);
  ctx.fill();

  // eye white
  ctx.fillStyle="#fff";
  ctx.beginPath(); ctx.arc(9,-3,7,0,Math.PI*2); ctx.fill();

  // eye shadow
  ctx.fillStyle="rgba(0,0,0,.08)";
  ctx.beginPath(); ctx.arc(9,-3,7,0,Math.PI*2); ctx.fill();

  // pupil
  ctx.fillStyle="#1e293b";
  ctx.beginPath(); ctx.arc(11,-3,4,0,Math.PI*2); ctx.fill();

  // shine
  ctx.fillStyle="#fff";
  ctx.beginPath(); ctx.arc(12.5,-5,1.8,0,Math.PI*2); ctx.fill();

  // eyebrow (angry/determined)
  ctx.strokeStyle="#92400e";
  ctx.lineWidth=2;
  ctx.lineCap="round";
  ctx.beginPath();
  ctx.moveTo(5,-10); ctx.lineTo(14,-8);
  ctx.stroke();

  // beak top
  ctx.fillStyle="#f97316";
  ctx.beginPath();
  ctx.moveTo(13,-1); ctx.lineTo(25,2); ctx.lineTo(13,6);
  ctx.closePath(); ctx.fill();
  // beak line
  ctx.strokeStyle="#ea580c";
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(13,2); ctx.lineTo(24,2);
  ctx.stroke();

  // outline
  ctx.strokeStyle="rgba(180,120,0,.3)";
  ctx.lineWidth=1;
  ctx.beginPath();
  ctx.ellipse(0,0,18,14,0,0,Math.PI*2);
  ctx.stroke();

  ctx.restore();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life*0.9;
    ctx.fillStyle=p.col;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawScoreHUD(){
  ctx.save();
  ctx.shadowColor="rgba(0,0,0,.4)";
  ctx.shadowBlur=8;
  ctx.fillStyle="#fff";
  ctx.font="bold 46px sans-serif";
  ctx.textAlign="center";
  ctx.fillText(score,W/2,70);
  ctx.restore();
}

function drawPanel(title,lines,y,accent){
  ctx.save();
  ctx.fillStyle="rgba(15,23,42,.72)";
  ctx.beginPath(); rr(W/2-115,y,230,lines.length*28+60,16); ctx.fill();

  ctx.strokeStyle="rgba(255,255,255,.12)";
  ctx.lineWidth=1;
  ctx.beginPath(); rr(W/2-115,y,230,lines.length*28+60,16); ctx.stroke();

  ctx.fillStyle=accent||"#f5c518";
  ctx.font="bold 24px sans-serif";
  ctx.textAlign="center";
  ctx.fillText(title,W/2,y+38);

  ctx.fillStyle="rgba(255,255,255,.75)";
  ctx.font="15px sans-serif";
  lines.forEach((l,i)=> ctx.fillText(l,W/2,y+70+i*28));
  ctx.restore();
}

function drawIdleScreen(){
  drawPanel("🐦 FLAPPY BIRD",[
    "SPACE / Click / Tap",
    "để bắt đầu!",
    ...(best>0?["Best: "+best]:[])
  ],H/2-100,"#f5c518");
}

function drawDeadScreen(){
  const medal=score>=30?"🏆":score>=15?"🥈":score>=5?"🥉":"";
  drawPanel("💥 GAME OVER",[
    "Score: "+score,
    "Best: "+best,
    medal?medal+" "+medal+" "+medal:"",
    "Nhấn để chơi lại"
  ],H/2-110,"#f87171");
}

// ── MAIN LOOP ──
let groundOff=0;
function loop(){
  update();

  ctx.save();
  if(shake>0){
    ctx.translate(
      (Math.random()-.5)*shake,
      (Math.random()-.5)*shake
    );
  }

  drawSky();
  drawClouds();

  // scrolling ground offset
  if(state==="play") groundOff=(groundOff+PIPE_SPEED)%W;

  pipes.forEach(drawPipe);
  drawGround(groundOff);
  drawBird();
  drawParticles();

  if(state==="play"||state==="dead") drawScoreHUD();
  if(state==="idle") drawIdleScreen();
  if(state==="dead") drawDeadScreen();

  ctx.restore();
  requestAnimationFrame(loop);
}

loop();

// MWG Auth
(function(){
  try{
    var s=JSON.parse(localStorage.getItem('mwg_session')||'{}');
    var el=document.getElementById('nav-user-nm');
    if(el) el.textContent=s.displayName||s.username||'—';
  }catch(e){}
})();
function mwgLogout(){
  localStorage.removeItem('mwg_session');
  window.location.href='./index.html';
}
</script>
</body>
</html>
